version: '3.9'

services:
  backend:
    build: ./backend
    restart: unless-stopped
    volumes:
      - ./data/db:/app/data          # SQLite 数据库
      - ./data/skills:/app/skills    # Skill 文件（可 SSH 直接编辑，热生效）
      - ./data/profiles:/app/profiles # 学生画像（运行时生成）
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - FEISHU_APP_ID=${FEISHU_APP_ID}
      - FEISHU_APP_SECRET=${FEISHU_APP_SECRET}
      - FEISHU_VERIFICATION_TOKEN=${FEISHU_VERIFICATION_TOKEN}
      - FEISHU_ENCRYPT_KEY=${FEISHU_ENCRYPT_KEY}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - DATABASE_URL=sqlite:////app/data/chagent.db
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
