<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>交互式终端回放</title>
  <link
    href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg-deep: #0d1117;
      --bg-terminal: #161b22;
      --bg-commentary: #1a1f2b;
      --bg-control: #010409;
      --text-primary: #e6edf3;
      --text-secondary: #8b949e;
      --text-dim: #484f58;
      --accent-green: #3fb950;
      --accent-blue: #58a6ff;
      --accent-red: #f85149;
      --accent-yellow: #d29922;
      --border: #30363d;
      --glass: rgba(22, 27, 34, 0.7);
    }

    body,
    html {
      width: 100%;
      height: 100%;
      background-color: var(--bg-deep);
      color: var(--text-primary);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      overflow: hidden;
    }

    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      width: 100vw;
    }

    .header {
      height: 48px;
      display: flex;
      align-items: center;
      padding: 0 20px;
      background: var(--bg-control);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .header-icon {
      font-size: 18px;
      margin-right: 12px;
    }

    .header-title {
      font-size: 15px;
      font-weight: 600;
    }

    .header-step-title {
      margin-left: auto;
      font-size: 14px;
      color: var(--accent-blue);
      font-weight: 600;
    }

    .main-panels {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ===== Terminal Panel ===== */
    .terminal-panel {
      flex: 1.1;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
      min-width: 0;
      background: var(--bg-terminal);
    }

    .terminal-tab-bar {
      display: flex;
      align-items: flex-end;
      padding: 0 16px;
      height: 36px;
      background: var(--bg-control);
      border-bottom: 1px solid var(--border);
    }

    .terminal-tab {
      padding: 6px 16px;
      background: var(--bg-terminal);
      border: 1px solid var(--border);
      border-bottom: none;
      border-radius: 6px 6px 0 0;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 8px;
      position: relative;
      top: 1px;
    }

    .terminal-tab .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent-green);
      box-shadow: 0 0 8px var(--accent-green);
    }

    .terminal-content {
      flex: 1;
      padding: 16px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      line-height: 1.6;
      overflow-y: auto;
      color: var(--text-primary);
    }

    .terminal-content::-webkit-scrollbar {
      width: 8px;
    }

    .terminal-content::-webkit-scrollbar-track {
      background: transparent;
    }

    .terminal-content::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    .term-line {
      white-space: pre-wrap;
      word-break: break-all;
    }

    .term-prompt {
      color: var(--accent-green);
      font-weight: 700;
    }

    .term-command {
      color: #f0f6fc;
    }

    .term-output {
      color: var(--text-secondary);
    }

    .term-highlight {
      color: var(--accent-yellow);
      font-weight: 700;
    }

    .term-error {
      color: var(--accent-red);
      font-weight: 700;
    }

    .term-info {
      color: var(--accent-blue);
    }

    .term-diff-add {
      color: var(--accent-green);
    }

    .term-diff-del {
      color: var(--accent-red);
    }

    .cursor {
      display: inline-block;
      width: 8px;
      height: 15px;
      background-color: var(--text-secondary);
      animation: blink 1s step-end infinite;
      vertical-align: text-bottom;
      margin-left: 1px;
    }

    @keyframes blink {
      50% {
        opacity: 0;
      }
    }

    .term-fade-in {
      animation: termFadeIn 0.4s ease-out;
    }

    @keyframes termFadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    /* ===== Commentary Panel ===== */
    .commentary-panel {
      flex: 1.15;
      display: flex;
      flex-direction: column;
      min-width: 0;
      border-right: 1px solid var(--border);
      background: var(--bg-commentary);
    }

    .commentary-tab-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: var(--bg-commentary);
      border-bottom: 1px solid var(--border);
      font-size: 12px;
      color: var(--text-secondary);
    }

    .commentary-content {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
    }

    .commentary-content::-webkit-scrollbar {
      width: 6px;
    }

    .commentary-content::-webkit-scrollbar-track {
      background: transparent;
    }

    .commentary-content::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    .comment-block {
      margin-bottom: 20px;
      padding: 16px 20px;
      background: var(--glass);
      border-radius: 10px;
      border-left: 3px solid var(--border);
      opacity: 0.15;
      transition: opacity 0.5s ease, border-color 0.5s ease, transform 0.4s ease;
      transform: translateY(4px) scale(0.98);
    }

    .comment-block.active {
      opacity: 1;
      border-left-color: var(--accent-blue);
      transform: translateY(0) scale(1);
    }

    .comment-block.past {
      opacity: 0.35;
      border-left-color: var(--text-dim);
      transform: translateY(0) scale(1);
    }

    .comment-step-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 600;
      color: var(--accent-blue);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    .comment-block.past .comment-step-badge {
      color: var(--text-dim);
    }

    .comment-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 10px;
    }

    .comment-body {
      font-size: 14px;
      line-height: 1.8;
      color: #c9d1d9;
    }

    .comment-body p {
      margin-bottom: 10px;
    }

    .comment-body strong {
      color: var(--text-primary);
      font-weight: 700;
    }

    .comment-body code {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      background: rgba(110, 118, 129, 0.2);
      padding: 2px 6px;
      border-radius: 4px;
      color: var(--accent-yellow);
    }

    .comment-body .thinking {
      color: var(--text-secondary);
      font-style: italic;
    }

    .comment-body .dialogue {
      display: block;
      margin: 12px 0;
      padding: 12px 14px 12px 42px;
      background: rgba(210, 153, 34, 0.08);
      border-left: 3px solid #d29922;
      border-radius: 0 8px 8px 0;
      color: var(--text-primary);
      font-size: 13px;
      line-height: 1.6;
      position: relative;
    }

    .comment-body .dialogue::before {
      content: '\1F9D1\200D\1F527';
      position: absolute;
      left: 12px;
      top: 12px;
      font-size: 16px;
    }

    .comment-body .dialogue .speaker {
      font-weight: 700;
      color: #d29922;
    }

    .comment-body .insight {
      display: block;
      margin: 10px 0;
      padding: 10px 14px;
      background: rgba(56, 139, 253, 0.08);
      border-left: 3px solid var(--accent-blue);
      border-radius: 0 6px 6px 0;
      color: var(--text-primary);
      font-size: 13px;
      font-style: normal;
    }

    .comment-body .warning {
      display: block;
      margin: 10px 0;
      padding: 10px 14px;
      background: rgba(248, 81, 73, 0.08);
      border-left: 3px solid var(--accent-red);
      border-radius: 0 6px 6px 0;
      color: var(--text-primary);
      font-size: 13px;
      font-style: normal;
    }

    .comment-body .conclusion {
      display: block;
      margin: 10px 0;
      padding: 10px 14px;
      background: rgba(63, 185, 80, 0.08);
      border-left: 3px solid var(--accent-green);
      border-radius: 0 6px 6px 0;
      color: var(--text-primary);
      font-size: 13px;
      font-style: normal;
    }

    /* Expandable Background Knowledge */
    .comment-body details {
      margin: 12px 0;
      background: rgba(13, 17, 23, 0.5);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    .comment-body summary {
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 600;
      color: var(--accent-blue);
      cursor: pointer;
      user-select: none;
      background: rgba(255, 255, 255, 0.03);
      transition: background 0.2s;
      outline: none;
    }

    .comment-body summary:hover {
      background: rgba(255, 255, 255, 0.08);
    }

    .comment-body details[open] summary {
      border-bottom: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.05);
    }

    .comment-body .details-content {
      padding: 12px 14px;
      font-size: 12.5px;
      line-height: 1.6;
      color: var(--text-secondary);
      background: transparent;
    }

    /* ===== Chat Panel ===== */
    .chat-panel {
      flex: 0.75;
      display: flex;
      flex-direction: column;
      min-width: 280px;
      background: var(--bg-commentary);
    }

    .chat-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: var(--bg-commentary);
      border-bottom: 1px solid var(--border);
      font-size: 13px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      background: var(--glass);
    }

    .chat-messages::-webkit-scrollbar {
      width: 6px;
    }

    .chat-messages::-webkit-scrollbar-track {
      background: transparent;
    }

    .chat-messages::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    .chat-msg {
      display: flex;
      flex-direction: column;
      max-width: 90%;
      font-size: 13px;
      line-height: 1.5;
    }

    .chat-msg.user {
      align-self: flex-end;
    }

    .chat-msg.ai {
      align-self: flex-start;
    }

    .chat-bubble {
      padding: 10px 14px;
      border-radius: 12px;
    }

    .chat-msg.user .chat-bubble {
      background: var(--accent-blue);
      color: #fff;
      border-bottom-right-radius: 2px;
    }

    .chat-msg.ai .chat-bubble {
      background: var(--bg-terminal);
      color: var(--text-primary);
      border-bottom-left-radius: 2px;
      border: 1px solid var(--border);
    }

    /* ===== Markdown inside chat bubbles ===== */
    .chat-bubble h1,
    .chat-bubble h2,
    .chat-bubble h3,
    .chat-bubble h4,
    .chat-bubble h5,
    .chat-bubble h6 {
      margin: 8px 0 4px;
      font-size: 14px;
      font-weight: 700;
      color: var(--text-primary);
    }

    .chat-bubble h1 {
      font-size: 16px;
    }

    .chat-bubble h2 {
      font-size: 15px;
    }

    .chat-bubble p {
      margin: 4px 0;
      line-height: 1.6;
    }

    .chat-bubble ul,
    .chat-bubble ol {
      margin: 4px 0 4px 18px;
      padding: 0;
    }

    .chat-bubble li {
      margin: 2px 0;
      line-height: 1.5;
    }

    .chat-bubble code {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      background: rgba(110, 118, 129, 0.25);
      padding: 1px 5px;
      border-radius: 4px;
      color: var(--accent-yellow);
    }

    .chat-bubble pre {
      margin: 6px 0;
      padding: 10px 12px;
      background: var(--bg-deep);
      border-radius: 6px;
      overflow-x: auto;
      border: 1px solid var(--border);
    }

    .chat-bubble pre code {
      background: none;
      padding: 0;
      color: var(--text-primary);
      font-size: 12px;
      line-height: 1.5;
    }

    .chat-bubble blockquote {
      margin: 6px 0;
      padding: 6px 12px;
      border-left: 3px solid var(--accent-blue);
      background: rgba(88, 166, 255, 0.06);
      color: var(--text-secondary);
      border-radius: 0 4px 4px 0;
    }

    .chat-bubble table {
      width: 100%;
      border-collapse: collapse;
      margin: 6px 0;
      font-size: 12px;
    }

    .chat-bubble th,
    .chat-bubble td {
      padding: 4px 8px;
      border: 1px solid var(--border);
      text-align: left;
    }

    .chat-bubble th {
      background: rgba(110, 118, 129, 0.15);
      font-weight: 600;
    }

    .chat-bubble strong {
      color: var(--text-primary);
      font-weight: 600;
    }

    .chat-bubble a {
      color: var(--accent-blue);
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    .chat-input-area {
      padding: 12px;
      background: var(--bg-commentary);
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
    }

    .chat-input {
      flex: 1;
      background: var(--bg-terminal);
      border: 1px solid var(--border);
      color: var(--text-primary);
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 13px;
      outline: none;
      font-family: inherit;
    }

    .chat-input:focus {
      border-color: var(--accent-blue);
    }

    .chat-send-btn {
      background: var(--accent-blue);
      color: #fff;
      border: none;
      border-radius: 8px;
      width: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .chat-send-btn:hover {
      opacity: 0.8;
    }

    .chat-link {
      color: var(--accent-yellow);
      cursor: pointer;
      text-decoration: underline dashed;
      text-underline-offset: 4px;
      font-weight: 500;
      transition: opacity 0.2s;
    }

    .chat-link:hover {
      opacity: 0.8;
    }

    /* typing indicator */
    .typing-dots {
      display: flex;
      gap: 4px;
      padding: 4px 2px;
    }

    .typing-dots span {
      width: 6px;
      height: 6px;
      background: var(--text-muted);
      border-radius: 50%;
      animation: typing 1.4s infinite ease-in-out both;
    }

    .typing-dots span:nth-child(1) {
      animation-delay: -0.32s;
    }

    .typing-dots span:nth-child(2) {
      animation-delay: -0.16s;
    }

    @keyframes typing {

      0%,
      80%,
      100% {
        transform: scale(0);
      }

      40% {
        transform: scale(1);
      }
    }

    /* ===== Control Bar ===== */
    .control-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 20px;
      background: var(--bg-control);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .ctrl-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-primary);
      font-size: 16px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      user-select: none;
    }

    .ctrl-btn:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .ctrl-btn:active {
      transform: scale(0.92);
    }

    .ctrl-btn.play-btn {
      width: 44px;
      height: 44px;
      background: var(--accent-green);
      border-color: var(--accent-green);
      color: #000;
      font-size: 18px;
      border-radius: 50%;
    }

    .ctrl-btn.play-btn:hover {
      background: #46d160;
    }

    .progress-container {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .progress-bar {
      flex: 1;
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      cursor: pointer;
      position: relative;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent-green), var(--accent-blue));
      border-radius: 3px;
      transition: width 0.3s;
      position: relative;
    }

    .progress-fill::after {
      content: '';
      position: absolute;
      right: -6px;
      top: -5px;
      width: 16px;
      height: 16px;
      background: var(--accent-blue);
      border-radius: 50%;
      border: 2px solid var(--bg-control);
      box-shadow: 0 0 8px rgba(88, 166, 255, 0.4);
    }

    .progress-label {
      font-size: 12px;
      color: var(--text-secondary);
      white-space: nowrap;
      min-width: 80px;
      font-family: 'JetBrains Mono', monospace;
    }

    .speed-btn {
      padding: 4px 10px;
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-secondary);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      font-family: 'JetBrains Mono', monospace;
      transition: all 0.2s;
    }

    .speed-btn:hover {
      color: var(--text-primary);
      border-color: var(--accent-blue);
    }

    .shortcuts-hint {
      font-size: 11px;
      color: var(--text-dim);
      display: flex;
      gap: 8px;
    }

    .shortcuts-hint kbd {
      display: inline-block;
      padding: 1px 5px;
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: 3px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
    }

  </style>
</head>

<body>



  <div class="app">
    <header class="header">
      <span class="header-icon">🔍</span>
      <span class="header-title" id="headerTitle"></span>
      <span class="header-step-title" id="headerStep"></span>
    </header>

    <div class="main-panels">
      <div class="terminal-panel">
        <div class="terminal-tab-bar">
          <div class="terminal-tab"><span class="dot"></span>Terminal</div>
        </div>
        <div class="terminal-content" id="terminal"></div>
      </div>

      <div class="commentary-panel">
        <div class="commentary-tab-bar">💬 思考过程</div>
        <div class="commentary-content" id="commentary"></div>
      </div>

      <div class="chat-panel">
        <div class="chat-header">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
          </svg>
          <span>AI 助教答疑</span>
        </div>
        <div class="chat-messages" id="chatMessages">
          <div class="chat-msg ai">
            <div class="chat-bubble">
              你好！我是这节课的 AI 助教。在阅读左侧时，点击带有虚线的<span class="chat-link"
                style="text-decoration:none">高亮关键词</span>，或者直接在下方输入框向我提问，我会为你深入解答底层原理。
            </div>
          </div>
        </div>
        <div class="chat-input-area">
          <input type="text" class="chat-input" id="chatInput" placeholder="输入你想了解的内容..." autocomplete="off"
            onkeypress="handleChatKeyPress(event)">
          <button class="chat-send-btn" onclick="sendChatMessage()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="22" y1="2" x2="11" y2="13"></line>
              <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
          </button>
        </div>
      </div>
    </div> <!-- /main-panels -->

    <div class="control-bar">
      <button class="ctrl-btn" onclick="player.prevStep()" title="上一步 (←)">⏮</button>
      <button class="ctrl-btn play-btn" id="playBtn" onclick="player.togglePlay()" title="播放/暂停 (Space)">▶</button>
      <button class="ctrl-btn" onclick="player.nextStep()" title="下一步 (→)">⏭</button>
      <div class="progress-container">
        <div class="progress-bar" id="progressBar" onclick="player.seekFromClick(event)">
          <div class="progress-fill" id="progressFill" style="width:0%"></div>
        </div>
        <span class="progress-label" id="progressLabel">0 / 0</span>
      </div>
      <button class="speed-btn" id="speedBtn" onclick="player.cycleSpeed()">1x</button>
      <div class="shortcuts-hint">
        <span><kbd>Space</kbd> 播放</span>
        <span><kbd>←</kbd><kbd>→</kbd> 切换</span>
      </div>
    </div>
  </div>

  <script>
    // Chat history for context
    const chatHistory = [];

    function getCurrentStepContext() {
      if (typeof player !== 'undefined' && player.currentStep >= 0 && player.currentStep < STEPS.length) {
        const step = STEPS[player.currentStep];
        return `步骤 ${player.currentStep + 1}: ${step.title}\n\n${step.commentary.replace(/<[^>]*>/g, '')}`;
      }
      return '';
    }

    function sendChatMessage(textOverride) {
      const input = document.getElementById('chatInput');
      const text = textOverride || input.value.trim();
      if (!text) return;

      appendMessage('user', text);
      chatHistory.push({ role: 'user', content: text });
      if (!textOverride) input.value = '';
      showTypingIndicator();
      callCaseChat(text);
    }

    async function callCaseChat(query) {
      const slug = (typeof CASE_SLUG !== 'undefined') ? CASE_SLUG : '';
      const studentToken = localStorage.getItem('student_token');
      const headers = { 'Content-Type': 'application/json' };
      if (studentToken) headers['Authorization'] = `Bearer ${studentToken}`;

      try {
        const resp = await fetch(`/api/cases/${slug}/chat/stream`, {
          method: 'POST',
          headers,
          body: JSON.stringify({
            message: query,
            context: getCurrentStepContext(),
            history: chatHistory.slice(-10)
          })
        });
        if (!resp.ok) throw new Error('API error');

        // Remove typing indicator and create AI bubble for streaming
        const container = document.getElementById('chatMessages');
        const typing = document.getElementById('typingIndicator');
        if (typing) typing.remove();

        const msgDiv = document.createElement('div');
        msgDiv.className = 'chat-msg ai';
        const bubble = document.createElement('div');
        bubble.className = 'chat-bubble';
        msgDiv.appendChild(bubble);
        container.appendChild(msgDiv);

        let fullText = '';
        const reader = resp.body.getReader();
        const decoder = new TextDecoder();
        let sseBuffer = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          sseBuffer += decoder.decode(value, { stream: true });

          const sseLines = sseBuffer.split('\n');
          sseBuffer = sseLines.pop();

          for (const line of sseLines) {
            if (!line.startsWith('data: ')) continue;
            try {
              const evt = JSON.parse(line.slice(6));
              if (evt.t) {
                fullText += evt.t;
                if (typeof marked !== 'undefined') {
                  bubble.innerHTML = marked.parse(fullText);
                } else {
                  bubble.textContent = fullText;
                }
                container.scrollTop = container.scrollHeight;
              }
              if (evt.done) {
                chatHistory.push({ role: 'assistant', content: fullText });
              }
            } catch (_) {}
          }
        }

        if (fullText && typeof marked !== 'undefined') {
          bubble.innerHTML = marked.parse(fullText);
        }
        if (!fullText) {
          bubble.innerHTML = '抱歉，暂时无法回答，请稍后重试。';
        }
        container.scrollTop = container.scrollHeight;
      } catch (e) {
        appendMessage('ai', '网络错误，请检查连接后重试。');
      }
    }

    function handleChatKeyPress(e) {
      if (e.key === 'Enter') sendChatMessage();
    }

    function appendMessage(role, text) {
      const container = document.getElementById('chatMessages');
      const typing = document.getElementById('typingIndicator');
      if (typing) typing.remove();

      const msgDiv = document.createElement('div');
      msgDiv.className = `chat-msg ${role}`;
      if (typeof marked !== 'undefined') {
        msgDiv.innerHTML = `<div class="chat-bubble">${marked.parse(text)}</div>`;
      } else {
        msgDiv.innerHTML = `<div class="chat-bubble">${text.replace(/\\n/g, '<br>')}</div>`;
      }
      container.appendChild(msgDiv);
      container.scrollTop = container.scrollHeight;
      return msgDiv;
    }

    function showTypingIndicator() {
      const container = document.getElementById('chatMessages');
      const msgDiv = document.createElement('div');
      msgDiv.className = `chat-msg ai`;
      msgDiv.id = 'typingIndicator';
      msgDiv.innerHTML = `<div class="chat-bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
      container.appendChild(msgDiv);
      container.scrollTop = container.scrollHeight;
    }

    function setupChatLinks() {
      document.querySelectorAll('.chat-link:not([data-bound])').forEach(link => {
        link.dataset.bound = 'true';
        link.addEventListener('click', (e) => {
          const keyword = e.target.innerText;
          sendChatMessage(`请详细解释一下：${keyword}`);
        });
      });
    }

    const STEPS = (typeof PLAYER_CONFIG !== 'undefined') ? PLAYER_CONFIG.steps : [];


    class TerminalPlayer {
      constructor(steps) {
        this.steps = steps;
        this.currentStep = -1;
        this.isPlaying = false;
        this.speed = 1;
        this.speeds = [0.5, 1, 2, 4];
        this.speedIdx = 1;
        this.typeTimer = null;
        this.pendingTimers = [];
        this.termEl = document.getElementById('terminal');
        this.commEl = document.getElementById('commentary');
        this.playBtn = document.getElementById('playBtn');
        this.progressFill = document.getElementById('progressFill');
        this.progressLabel = document.getElementById('progressLabel');
        this.speedBtn = document.getElementById('speedBtn');
        this.headerStep = document.getElementById('headerStep');

        this.buildCommentary();
        this.updateProgress();
        setTimeout(setupChatLinks, 100);
      }

      buildCommentary() {
        this.commEl.innerHTML = this.steps.map((s, i) =>
          `<div class="comment-block" id="comment-${i}">
        <div class="comment-step-badge">步骤 ${i + 1} / ${this.steps.length}</div>
        <div class="comment-title">${s.title}</div>
        <div class="comment-body">${s.commentary}</div>
      </div>`
        ).join('');
      }

      updateProgress() {
        const total = this.steps.length;
        const current = this.currentStep + 1;
        const pct = total > 0 ? (current / total) * 100 : 0;
        this.progressFill.style.width = pct + '%';
        this.progressLabel.textContent = `${current} / ${total}`;
      }

      updatePlayBtn() {
        this.playBtn.textContent = this.isPlaying ? '⏸' : '▶';
        this.playBtn.style.boxShadow = this.isPlaying ? '0 0 15px rgba(63,185,80,0.6)' : 'none';
      }

      highlightComment(idx) {
        this.steps.forEach((_, i) => {
          const el = document.getElementById(`comment-${i}`);
          el.classList.remove('active', 'past');
          if (i === idx) el.classList.add('active');
          else if (i < idx) el.classList.add('past');
        });
        if (idx >= 0) {
          const el = document.getElementById(`comment-${idx}`);
          el.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
      }

      clearTimers() {
        clearTimeout(this.typeTimer);
        this.pendingTimers.forEach(t => clearTimeout(t));
        this.pendingTimers = [];
      }

      delay(ms) {
        return new Promise(resolve => {
          const t = setTimeout(resolve, ms / this.speed);
          this.pendingTimers.push(t);
        });
      }

      async typeText(text, container, charDelay, className) {
        return new Promise(resolve => {
          let i = 0;
          const span = document.createElement('span');
          span.className = className;
          container.appendChild(span);
          const cursor = document.createElement('span');
          cursor.className = 'cursor';
          container.appendChild(cursor);

          const type = () => {
            if (i < text.length) {
              span.textContent += text[i]; i++;
              this.termEl.scrollTop = this.termEl.scrollHeight;
              this.typeTimer = setTimeout(type, charDelay / this.speed);
            } else {
              cursor.remove();
              resolve();
            }
          };
          type();
        });
      }

      colorClass(line) {
        if (line.includes('Error') || line.includes('panic') || line.includes('fault') || line.includes('Unhandled')) return 'term-error';
        if (line.startsWith('+')) return 'term-diff-add';
        if (line.startsWith('-')) return 'term-diff-del';
        if (line.includes('Info :') || line.includes('OK') || line.includes('connected') || line.includes('Terminal ready')) return 'term-info';
        if (line.includes('Starting kernel') || line.includes('Welcome to') || line.includes('login:') || line.includes('Serial:') || line.includes('ttyAMA0') || line.includes('ttyS0')) return 'term-highlight';
        return 'term-output';
      }

      appendOutput(text) {
        if (!text) return;
        text.split('\\n').forEach(line => {
          const div = document.createElement('div');
          div.className = 'term-line';
          const span = document.createElement('span');
          span.className = this.colorClass(line);
          span.textContent = line;
          div.appendChild(span);
          this.termEl.appendChild(div);
        });
        this.termEl.scrollTop = this.termEl.scrollHeight;
      }

      renderTerminal(step, animated) {
        this.termEl.innerHTML = '';
        if (!step.terminal) {
          this.termEl.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-dim);font-family:Inter,sans-serif;font-size:14px;text-align:center"><div><div style="font-size:48px;margin-bottom:12px">💬</div>阅读右侧思考过程</div></div>`;
          return Promise.resolve();
        }

        this.termEl.classList.add('term-fade-in');
        setTimeout(() => this.termEl.classList.remove('term-fade-in'), 400);

        const t = step.terminal;

        if (!animated) {
          if (t.command) {
            t.command.split('\\n').forEach(cmdLine => {
              const lineDiv = document.createElement('div');
              lineDiv.className = 'term-line';
              if (t.prompt && !cmdLine.startsWith('(')) {
                const ps = document.createElement('span');
                ps.className = 'term-prompt';
                ps.textContent = t.prompt;
                lineDiv.appendChild(ps);
              }
              const cs = document.createElement('span');
              cs.className = 'term-command';
              cs.textContent = cmdLine;
              lineDiv.appendChild(cs);
              this.termEl.appendChild(lineDiv);
            });
          }
          this.appendOutput(t.output);
          return Promise.resolve();
        }

        return (async () => {
          if (t.command) {
            const cmds = t.command.split('\\n');
            for (let c = 0; c < cmds.length; c++) {
              const lineDiv = document.createElement('div');
              lineDiv.className = 'term-line';
              if (t.prompt && !cmds[c].startsWith('(')) {
                const ps = document.createElement('span');
                ps.className = 'term-prompt';
                ps.textContent = t.prompt;
                lineDiv.appendChild(ps);
              }
              this.termEl.appendChild(lineDiv);
              await this.typeText(cmds[c], lineDiv, 35, 'term-command');
              await this.delay(150);
            }
            await this.delay(400);
          }
          this.appendOutput(t.output);
          await this.delay(30000);
        })();
      }

      showStep(idx, animated) {
        if (idx < 0 || idx >= this.steps.length) return Promise.resolve();
        this.currentStep = idx;
        this.updateProgress();
        this.headerStep.textContent = this.steps[idx].title;
        this.highlightComment(idx);

        return this.renderTerminal(this.steps[idx], animated);
      }

      async play() {
        this.isPlaying = true;
        this.updatePlayBtn();
        while (this.isPlaying && this.currentStep < this.steps.length - 1) {
          await this.showStep(this.currentStep + 1, true);
          if (!this.isPlaying) break;
        }
        this.isPlaying = false;
        this.updatePlayBtn();
      }

      pause() {
        this.isPlaying = false;
        this.clearTimers();
        this.updatePlayBtn();
      }

      togglePlay() {
        if (this.isPlaying) {
          this.pause();
        } else {
          if (this.currentStep >= this.steps.length - 1) this.currentStep = -1;
          this.play();
        }
      }

      prevStep() { this.pause(); if (this.currentStep > 0) this.showStep(this.currentStep - 1, false); }
      nextStep() { this.pause(); if (this.currentStep < this.steps.length - 1) this.showStep(this.currentStep + 1, false); }

      cycleSpeed() {
        this.speedIdx = (this.speedIdx + 1) % this.speeds.length;
        this.speed = this.speeds[this.speedIdx];
        this.speedBtn.textContent = this.speed + 'x';
      }

      seekFromClick(e) {
        const rect = document.getElementById('progressBar').getBoundingClientRect();
        const idx = Math.round(((e.clientX - rect.left) / rect.width) * (this.steps.length - 1));
        this.pause();
        this.showStep(Math.max(0, Math.min(idx, this.steps.length - 1)), false);
      }
    }

    const player = new TerminalPlayer(STEPS);

    document.addEventListener('keydown', e => {
      // Don't hijack keys when the user is typing in an input/textarea
      const tag = document.activeElement && document.activeElement.tagName;
      if (tag === 'INPUT' || tag === 'TEXTAREA' || (document.activeElement && document.activeElement.isContentEditable)) return;

      if (e.code === 'Space') { e.preventDefault(); player.togglePlay(); }
      if (e.code === 'ArrowLeft') { e.preventDefault(); player.prevStep(); }
      if (e.code === 'ArrowRight') { e.preventDefault(); player.nextStep(); }
    });


    // ── Initialize from PLAYER_CONFIG ──
    (function() {
      if (typeof PLAYER_CONFIG === 'undefined') {
        console.error('PLAYER_CONFIG not found. Make sure player-data.js is loaded.');
        return;
      }
      const cfg = PLAYER_CONFIG;
      document.title = cfg.title + ' — 交互式终端回放';
      document.getElementById('headerTitle').textContent = cfg.title;
      // Auto-start playback
      setTimeout(() => player.play(), 300);
    })();

  </script>
</body>
